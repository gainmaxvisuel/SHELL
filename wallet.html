<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARAIMO | Mon Équipe</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* THÈME DARK PREMIUM (Référence 1000780917.jpg) */
:root {
    --bg-dark: #0a1128;
    --card-bg: #1c253d;
    --gold: #d4af37;
    --text-white: #ffffff;
    --text-gray: #a0acbd;
    --accent-purple: #7b61ff;
    --red-stat: #ff5a5a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-white);
    padding-bottom: 90px;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* SECTION INVITATION */
.invite-container {
    background: var(--card-bg);
    margin: 15px;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.05);
}

.invite-label {
    font-size: 13px;
    color: var(--text-gray);
    margin-bottom: 10px;
}

.invite-box {
    display: flex;
    background: var(--bg-dark);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
}

.invite-url {
    flex: 1;
    padding: 12px;
    font-size: 13px;
    color: var(--text-white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.copy-btn {
    background: var(--accent-purple);
    color: white;
    padding: 12px 20px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}

/* TOP STATS */
.top-stats {
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    margin-top: 10px;
}

.stat-item { text-align: center; }
.stat-label { font-size: 11px; color: var(--text-gray); text-transform: uppercase; }
.stat-value { font-size: 18px; font-weight: bold; color: var(--red-stat); margin-top: 5px; }

/* CARTES NIVEAUX (Design 1000780917.jpg) */
.level-card {
    background: var(--card-bg);
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.05);
}

.level-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 15px;
}

.mini-box {
    flex: 1;
    background: var(--bg-dark);
    padding: 12px;
    border-radius: 10px;
    text-align: center;
}

.mini-label { font-size: 11px; color: var(--text-gray); display: block; margin-bottom: 5px; }
.mini-value { font-size: 15px; font-weight: bold; color: var(--text-white); }
.revenue-val { color: var(--red-stat); }

.level-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px dashed rgba(255,255,255,0.1);
}

.level-title { font-size: 15px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

/* MENU BAS */
.menu-bottom {
    position: fixed; bottom: 0; width: 100%; background: #0d1631;
    display: flex; justify-content: space-around; padding: 12px 0;
    border-top: 1px solid rgba(255,255,255,0.05);
}

.menu-item { text-align: center; color: var(--text-gray); font-size: 11px; cursor: pointer; flex: 1; }
.menu-item.active { color: var(--text-white); }
.menu-item span { display: block; font-size: 20px; margin-bottom: 3px; }

/* TOAST */
.toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; display: none; z-index: 1000;
}
</style>
</head>

<body>

<div class="header">Mon équipe</div>

<!-- INVITATION -->
<div class="invite-container">
    <div class="invite-label">Lien d'invitation</div>
    <div class="invite-box">
        <div class="invite-url" id="linkText">https://araimo.app/?ref=...</div>
        <button class="copy-btn" onclick="copyInvite()">Copier</button>
    </div>

    <div class="top-stats">
        <div class="stat-item">
            <div class="stat-label">🏷 Revenu Total</div>
            <div class="stat-value" id="totalRevenue">0.00 FCFA</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">🏷 Taille l'équipe</div>
            <div class="stat-value" id="teamSize">0</div>
        </div>
    </div>
</div>

<!-- NIVEAU B -->
<div class="level-card">
    <div class="level-row">
        <div class="mini-box">
            <span class="mini-label">Taille</span>
            <span class="mini-value" id="lvl1Size">0</span>
        </div>
        <div class="mini-box">
            <span class="mini-label">Revenu</span>
            <span class="mini-value revenue-val" id="lvl1Rev">0.00 FCFA</span>
        </div>
    </div>
    <div class="level-footer">
        <div class="level-title">🔥 B Niveau (15%)</div>
        <span>›</span>
    </div>
</div>

<!-- NIVEAU C -->
<div class="level-card">
    <div class="level-row">
        <div class="mini-box">
            <span class="mini-label">Taille</span>
            <span class="mini-value" id="lvl2Size">0</span>
        </div>
        <div class="mini-box">
            <span class="mini-label">Revenu</span>
            <span class="mini-value revenue-val" id="lvl2Rev">0.00 FCFA</span>
        </div>
    </div>
    <div class="level-footer">
        <div class="level-title">🔥 C Niveau (3%)</div>
        <span>›</span>
    </div>
</div>

<!-- NIVEAU D -->
<div class="level-card">
    <div class="level-row">
        <div class="mini-box">
            <span class="mini-label">Taille</span>
            <span class="mini-value" id="lvl3Size">0</span>
        </div>
        <div class="mini-box">
            <span class="mini-label">Revenu</span>
            <span class="mini-value revenue-val" id="lvl3Rev">0.00 FCFA</span>
        </div>
    </div>
    <div class="level-footer">
        <div class="level-title">🔥 D Niveau (2%)</div>
        <span>›</span>
    </div>
</div>

<div class="menu-bottom">
    <div class="menu-item" onclick="location.href='dashboard.html'"><span>🏠</span>Accueil</div>
    <div class="menu-item" onclick="location.href='product.html'"><span>🚀</span>Investir</div>
    <div class="menu-item active"><span>👥</span>Réseau</div>
    <div class="menu-item" onclick="location.href='account.html'"><span>⚙️</span>Réglages</div>
</div>

<div id="toast" class="toast"></div>

<script>
const client = supabase.createClient(
    "https://ycswpdydsgoqplkqtpsd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

let userId = localStorage.getItem("user_id");

function showToast(m) {
    const t = document.getElementById("toast");
    t.innerText = m; t.style.display = "block";
    setTimeout(() => t.style.display = "none", 2000);
}

async function copyInvite() {
    const text = document.getElementById("linkText").innerText;
    await navigator.clipboard.writeText(text);
    showToast("Lien copié !");
}

async function init() {
    if(!userId) return;

    // 1. Infos utilisateur & Lien
    const { data:user } = await client.from("users").select("referral_code").eq("id", userId).single();
    if(user) {
        document.getElementById("linkText").innerText = `https://araimo.app/?ref=${user.referral_code}`;
    }

    // 2. Équipe & Commissions
    const { data:allUsers } = await client.from("users").select("id, referred_by");
    const { data:coms } = await client.from("commissions").select("amount, from_user");

    let lvl1 = allUsers.filter(u => u.referred_by === userId);
    let lvl2 = allUsers.filter(u => lvl1.some(l1 => l1.id === u.referred_by));
    let lvl3 = allUsers.filter(u => lvl2.some(l2 => l2.id === u.referred_by));

    let r1 = 0, r2 = 0, r3 = 0;
    coms.forEach(c => {
        if(lvl1.some(u => u.id === c.from_user)) r1 += c.amount;
        else if(lvl2.some(u => u.id === c.from_user)) r2 += c.amount;
        else if(lvl3.some(u => u.id === c.from_user)) r3 += c.amount;
    });

    // Update UI
    document.getElementById("teamSize").innerText = lvl1.length + lvl2.length + lvl3.length;
    document.getElementById("totalRevenue").innerText = (r1 + r2 + r3).toFixed(2) + " FCFA";
    
    document.getElementById("lvl1Size").innerText = lvl1.length;
    document.getElementById("lvl1Rev").innerText = r1.toFixed(2) + " FCFA";
    
    document.getElementById("lvl2Size").innerText = lvl2.length;
    document.getElementById("lvl2Rev").innerText = r2.toFixed(2) + " FCFA";
    
    document.getElementById("lvl3Size").innerText = lvl3.length;
    document.getElementById("lvl3Rev").innerText = r3.toFixed(2) + " FCFA";
}

init();
</script>
</body>
</html>
