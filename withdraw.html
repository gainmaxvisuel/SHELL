<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAIMO | Retrait</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a1128;
            --card-bg: #1c253d;
            --gold: #d4af37;
            --text-white: #ffffff;
            --text-gray: #a0acbd;
            --danger: #e63946;
            --success: #00ffcc;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-dark); color: var(--text-white); padding: 20px; 
        }

        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { font-size: 24px; color: var(--gold); cursor: pointer; margin-right: 15px; text-decoration: none; }

        /* Solde */
        .balance-card {
            background: linear-gradient(145deg, #1e294b, #121a2f);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center; margin-bottom: 25px;
        }
        .balance-card span { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
        .balance-card h2 { margin: 8px 0 0; font-size: 32px; font-weight: 800; }

        .withdraw-card { background: var(--card-bg); border-radius: 28px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        .section-label { font-size: 12px; color: var(--text-gray); margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }

        /* Sélecteur d'opérateurs avec images */
        .operator-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .op-item {
            background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .op-item img { width: 40px; height: 40px; border-radius: 8px; margin-bottom: 5px; object-fit: cover; }
        .op-item span { display: block; font-size: 11px; color: var(--text-gray); }
        .op-item.active { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .op-item.active span { color: var(--gold); font-weight: bold; }

        /* Inputs */
        input {
            width: 100%; padding: 16px; background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px;
            color: white; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        /* Résumé des frais */
        .summary-box {
            background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 15px;
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);
        }
        .summary-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .summary-total { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; margin-top: 5px; font-weight: bold; font-size: 16px; color: var(--success); }

        .btn-withdraw {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #d4af37, #b8860b);
            border: none; border-radius: 16px; color: #0a1128; font-weight: 800;
            font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-withdraw:active { transform: scale(0.98); }

        .footer-note { font-size: 11px; color: var(--text-gray); text-align: center; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <a href="dashboard.html" class="back-btn">←</a>
    <div style="font-size: 18px; font-weight: 700; letter-spacing: 0.5px;">RETRAIT SHELL</div>
</div>

<div class="balance-card">
    <span>Solde Disponible</span>
    <h2 id="balanceText">0 XOF</h2>
</div>

<div class="withdraw-card">
    <div class="section-label">Sélectionner l'opérateur</div>
    <div class="operator-grid">
        <div class="op-item" onclick="selectOp('Orange Money', this)">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg" alt="Orange">
            <span>Orange</span>
        </div>
        <div class="op-item" onclick="selectOp('Moov Money', this)">
            <img src="https://img.over-blog-kiwi.com/1/45/63/02/20210103/ob_876b50_moov-africa.jpeg" alt="Moov">
            <span>Moov</span>
        </div>
        <div class="op-item" onclick="selectOp('Wave', this)">
            <img src="https://play-lh.googleusercontent.com/9m_m73_v-mC9D9C_m_U3k3Lw_6A9A8B6vHn_V-V-v-_V-v-_V-v-_V-v-_V-v-_V-v-I" alt="Wave">
            <span>Wave</span>
        </div>
    </div>

    <div class="section-label">Numéro de téléphone</div>
    <input type="tel" id="phone" placeholder="Ex: 07 00 00 00">

    <div class="section-label">Montant du retrait (Min 1000)</div>
    <input type="number" id="amount" placeholder="Entrez le montant" oninput="calculateFees()">

    <div class="summary-box" id="summaryBox">
        <div class="summary-line"><span>Montant brut</span> <span id="resBrut">0 XOF</span></div>
        <div class="summary-line"><span>Frais de service (7%)</span> <span id="resFrais" style="color:var(--danger)">- 0 XOF</span></div>
        <div class="summary-line summary-total"><span>Net à recevoir</span> <span id="resNet">0 XOF</span></div>
    </div>

    <button class="btn-withdraw" id="btnAction" onclick="processWithdrawal()">Demander le retrait</button>
    
    <div class="footer-note">
        Traitement manuel sécurisé sous <b>1h à 24h</b>.<br>
        Vérifiez bien votre numéro avant de valider.
    </div>
</div>

<script>
const client = supabase.createClient("https://ycswpdydsgoqplkqtpsd.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA");
const uid = localStorage.getItem("user_id");
let balance = 0;
let selectedOperator = "";

async function fetchBalance() {
    if(!uid) return;
    const { data } = await client.from("users").select("balance").eq("id", uid).single();
    if(data) {
        balance = data.balance;
        document.getElementById("balanceText").innerText = balance.toLocaleString() + " XOF";
    }
}

function selectOp(name, el) {
    document.querySelectorAll('.op-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    selectedOperator = name;
}

function calculateFees() {
    const amt = parseFloat(document.getElementById("amount").value) || 0;
    const fees = Math.round(amt * 0.07);
    const net = amt - fees;

    document.getElementById("resBrut").innerText = amt.toLocaleString() + " XOF";
    document.getElementById("resFrais").innerText = "- " + fees.toLocaleString() + " XOF";
    document.getElementById("resNet").innerText = (net > 0 ? net : 0).toLocaleString() + " XOF";
}

async function processWithdrawal() {
    const amt = parseInt(document.getElementById("amount").value);
    const tel = document.getElementById("phone").value;
    const btn = document.getElementById("btnAction");

    if(!selectedOperator) { alert("Veuillez choisir un opérateur"); return; }
    if(!tel || tel.length < 8) { alert("Numéro de téléphone invalide"); return; }
    if(!amt || amt < 1000) { alert("Le montant minimum est de 1000 XOF"); return; }
    if(amt > balance) { alert("Solde insuffisant !"); return; }

    btn.disabled = true;
    btn.innerText = "Validation...";

    try {
        // Débiter le solde
        const { error: errUpd } = await client.from("users").update({ balance: balance - amt }).eq("id", uid);
        if(errUpd) throw errUpd;

        // Enregistrer la transaction
        const { error: errIns } = await client.from("transactions").insert([{
            user_id: uid, amount: amt, type: 'withdraw', status: 'pending',
            description: `Retrait ${selectedOperator} vers ${tel}`
        }]);
        if(errIns) throw errIns;

        alert("✅ Demande reçue ! Votre retrait est en cours de traitement.");
        location.href = "history.html";
    } catch (e) {
        alert("Erreur: " + e.message);
        btn.disabled = false;
        btn.innerText = "Demander le retrait";
    }
}

fetchBalance();
</script>
</body>
</html>
