<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARAIMO | Recharge</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #0a1128;
            --card-bg: #1c253d;
            --gold: #d4af37;
            --text-white: #ffffff;
            --text-gray: #a0acbd;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-white); padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { font-size: 24px; color: var(--gold); text-decoration: none; margin-right: 15px; cursor: pointer; }
        .deposit-card { background: var(--card-bg); border-radius: 25px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 14px; }
        input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn-pay { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold), #f1e0a1); border: none; border-radius: 15px; color: #0a1128; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .note { font-size: 12px; color: var(--text-gray); margin-top: 15px; line-height: 1.4; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="back-btn" onclick="location.href='dashboard.html'">←</div>
    <h2>Recharger mon compte</h2>
</div>

<div class="deposit-card">
    <div class="input-group">
        <label>Montant à envoyer (XOF)</label>
        <input type="number" id="amount" placeholder="Entrez le montant exact">
    </div>

    <div class="input-group">
        <label>Votre numéro de téléphone (Paiement)</label>
        <input type="text" id="phone" placeholder="Numéro utilisé pour l'envoi">
    </div>

    <button class="btn-pay" id="confirmBtn" onclick="enregistrerEtPayer()">EFFECTUER LE PAIEMENT</button>
    
    <p class="note">
        ⚠️ Après avoir cliqué, vous serez redirigé vers notre lien de paiement sécurisé. 
        Votre compte sera crédité après vérification manuelle de votre dépôt.
    </p>
</div>

<script>
const client = supabase.createClient(
    "https://ycswpdydsgoqplkqtpsd.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inljc3dwZHlkc2dvcXBsa3F0cHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjY4MTcsImV4cCI6MjA5MDU0MjgxN30.67bBMdHtcGFIJuZuY_Xd4hBN4hj86JjHVXGN3oPbKMA"
);

async function enregistrerEtPayer() {
    const amount = document.getElementById('amount').value;
    const phone = document.getElementById('phone').value;
    const uid = localStorage.getItem("user_id");
    const btn = document.getElementById('confirmBtn');

    if(!uid) { alert("Erreur : Veuillez vous reconnecter."); return; }
    if(!amount || amount < 500) { alert("Veuillez entrer un montant valide."); return; }

    btn.disabled = true;
    btn.innerText = "Enregistrement...";

    try {
        // 1. ON CRÉE LA TRACE DANS LA TABLE DEPOSITS
        const { error } = await client
            .from('deposits')
            .insert([{
                user_id: uid,
                amount: parseInt(amount),
                phone: phone,
                status: 'pending' // En attente de ta validation manuelle
            }]);

        if (error) throw error;

        // 2. REDIRECTION VERS TON LIEN DE PAIEMENT FIXE
        // L'utilisateur part payer sur le lien que tu as fourni
        setTimeout(() => {
            window.location.href = "https://leekpay.me/shell";
        }, 800);

    } catch (err) {
        alert("Erreur base de données : " + err.message);
        btn.disabled = false;
        btn.innerText = "EFFECTUER LE PAIEMENT";
    }
}
</script>

</body>
</html>
